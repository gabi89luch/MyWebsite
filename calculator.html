<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentin Gabriel Luchian - Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="index.html">Valentin Gabriel Luchian</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                <li class="nav-item"><a class="nav-link active" href="calculator.html">Calculator</a></li>
            </ul>
        </div>
    </div>
</nav>

<header class="bg-primary text-white text-center py-4">
    <div class="container">
        <h1 class="display-5">Calculator</h1>
    </div>
</header>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">

            <div class="card shadow">
                <div class="card-body p-4">
                    <h2 class="card-title text-center mb-4">Simple Calculator</h2>

                    <div class="mb-3">
                        <label for="num1" class="form-label">First Number</label>
                        <input type="number" class="form-control form-control-lg" id="num1" placeholder="First number">
                    </div>

                    <div class="mb-3">
                        <label for="operator" class="form-label">Operation</label>
                        <select class="form-select form-select-lg" id="operator">
                            <option value="+">+ Addition</option>
                            <option value="-">- Subtraction</option>
                            <option value="*">x Multiplication</option>
                            <option value="/">/ Division</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="num2" class="form-label">Second Number</label>
                        <input type="number" class="form-control form-control-lg" id="num2" placeholder="Second number">
                    </div>

                    <button id="calcBtn" class="btn btn-primary btn-lg w-100 mb-3" onclick="calculate()">
                        = Calculate
                    </button>

                    <div id="result" class="alert alert-success text-center fs-4 fw-bold">
                        Answer will appear here
                    </div>
                </div>
            </div>

        </div>
    </div>
</main>

<footer class="bg-dark text-white text-center py-3">
    <p class="mb-0">&copy; 2026 Valentin Gabriel Luchian</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function calculate() {
        let a  = parseFloat(document.getElementById('num1').value);
        let b  = parseFloat(document.getElementById('num2').value);
        let op = document.getElementById('operator').value;
        let result = document.getElementById('result');

        if (isNaN(a) || isNaN(b)) {
            result.className = 'alert alert-danger text-center fs-5';
            result.innerHTML = 'Please enter two numbers.';
            return;
        }

        let answer;
        if      (op === '+') { answer = a + b; }
        else if (op === '-') { answer = a - b; }
        else if (op === '*') { answer = a * b; }
        else if (op === '/') {
            if (b === 0) {
                result.className = 'alert alert-danger text-center fs-5';
                result.innerHTML = 'Error: Cannot divide by zero!';
                return;
            } else {
                answer = a / b;
            }
        }

        result.className = 'alert alert-success text-center fs-4 fw-bold';
        result.innerHTML = a + ' ' + op + ' ' + b + ' = ' + answer;
    }
</script>
</body>
</html>
