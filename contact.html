<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentin Gabriel Luchian - Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="index.html">Valentin Gabriel Luchian</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                <li class="nav-item"><a class="nav-link" href="calculator.html">Calculator</a></li>
            </ul>
        </div>
    </div>
</nav>

<header class="bg-primary text-white text-center py-4">
    <div class="container">
        <h1 class="display-5">Get in Touch</h1>
    </div>
</header>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <form id="contactForm" class="needs-validation" novalidate>
                <fieldset class="border p-4 rounded mb-4 shadow-sm">
                    <legend class="fw-bold px-2 w-auto">Personal Details</legend>

                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name:</label>
                        <input type="text" class="form-control" id="name" name="name" required minlength="2" maxlength="50" placeholder="e.g. Mary Murphy">
                        <div class="invalid-feedback" id="nameErr">Please enter your full name (at least 2 characters).</div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address:</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="you@example.com">
                        <div class="invalid-feedback" id="emailErr">Please enter a valid email address.</div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="pw" class="form-label">Create a Password:</label>
                            <input type="password" class="form-control" id="pw" name="password" minlength="8">
                        </div>
                        <div class="col-md-6">
                            <label for="age" class="form-label">Your Age:</label>
                            <input type="number" class="form-control" id="age" name="age" min="16" max="99">
                        </div>
                    </div>
                </fieldset>

                <fieldset class="border p-4 rounded mb-4 shadow-sm">
                    <legend class="fw-bold px-2 w-auto">Your Message</legend>

                    <div class="mb-3">
                        <label for="subject" class="form-label">Subject:</label>
                        <select class="form-select" id="subject" name="subject">
                            <option value="">-- Choose a subject --</option>
                            <option value="work">Work Enquiry</option>
                            <option value="general">General Message</option>
                            <option value="feedback">Website Feedback</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label d-block">How did you find my site?</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="google" name="source" value="google">
                            <label class="form-check-label" for="google">Google</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="social" name="source" value="social">
                            <label class="form-check-label" for="social">Social Media</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="friend" name="source" value="friend">
                            <label class="form-check-label" for="friend">A Friend</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label d-block">Priority:</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="low" name="priority" value="low">
                            <label class="form-check-label" for="low">Low</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="high" name="priority" value="high">
                            <label class="form-check-label" for="high">High</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="msg" class="form-label">Your Message:</label>
                        <textarea class="form-control" id="msg" name="message" rows="5" required minlength="10" placeholder="Write your message here..."></textarea>
                        <div class="invalid-feedback" id="msgErr">Message must be at least 10 characters.</div>
                    </div>
                </fieldset>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary btn-lg px-5">Send Message</button>
                </div>
            </form>

        </div>
    </div>
</main>

<footer class="bg-dark text-white text-center py-3">
    <p class="mb-0">&copy; 2026 Valentin Gabriel Luchian</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('contactForm')
  .addEventListener('submit', function(event) {
    event.preventDefault();

    let name  = document.getElementById('name').value.trim();
    let email = document.getElementById('email').value.trim();
    let msg   = document.getElementById('msg').value.trim();
    let valid = true;

    ['nameErr', 'emailErr', 'msgErr'].forEach(id => {
        document.getElementById(id).style.display = 'none';
    });
    document.getElementById('name').classList.remove('is-invalid');
    document.getElementById('email').classList.remove('is-invalid');
    document.getElementById('msg').classList.remove('is-invalid');

    if (name.length < 2) {
      document.getElementById('nameErr').style.display = 'block';
      document.getElementById('name').classList.add('is-invalid');
      valid = false;
    }

    if (!email.includes('@') || !email.includes('.')) {
      document.getElementById('emailErr').style.display = 'block';
      document.getElementById('email').classList.add('is-invalid');
      valid = false;
    }

    if (msg.length < 10) {
      document.getElementById('msgErr').style.display = 'block';
      document.getElementById('msg').classList.add('is-invalid');
      valid = false;
    }

    if (valid) {
      alert('Thank you, ' + name + '! Your message has been sent.');
      document.getElementById('contactForm').reset();
    }
  });
</script>
</body>
</html>
