<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentin Gabriel Luchian - Contact</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">Valentin Gabriel Luchian</a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNav"
                aria-controls="mainNav"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="contact.html">Contact</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="calculator.html">Calculator</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <h1 class="display-5 mb-4">Get in Touch</h1>

            <form id="contactForm">

                <div class="mb-3">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name" placeholder="Enter your name">
                    <p class="text-danger" id="nameErr"></p>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email">
                    <p class="text-danger" id="emailErr"></p>
                </div>

                <div class="mb-3">
                    <label for="message" class="form-label">Message</label>
                    <textarea class="form-control" id="message" rows="4" placeholder="Your message"></textarea>
                    <p class="text-danger" id="msgErr"></p>
                </div>

                <button type="submit" class="btn btn-primary w-100">Send Message</button>

            </form>

        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-3">
    <p class="mb-0">&copy; 2026 Valentin Gabriel Luchian</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('contactForm')
  .addEventListener('submit', function(e) {
    e.preventDefault();
    let name = document.getElementById('name').value;
    let email = document.getElementById('email').value;
    let message = document.getElementById('message').value;
    let ok = true;

    if (name.length < 2) {
      document.getElementById('nameErr')
        .innerHTML = 'Please enter your full name.';
      ok = false;
    } else {
      document.getElementById('nameErr').innerHTML = '';
    }
    if (!email.includes('@')) {
      document.getElementById('emailErr')
        .innerHTML = 'Please enter a valid email.';
      ok = false;
    } else {
      document.getElementById('emailErr').innerHTML = '';
    }
    if (message.length < 10) {
      document.getElementById('msgErr')
        .innerHTML = 'Message must be at least 10 characters.';
      ok = false;
    } else {
      document.getElementById('msgErr').innerHTML = '';
    }
    if (ok) {
      alert('Thank you, ' + name + '! Your message has been sent.');
      document.getElementById('contactForm').reset();
    }
  });
</script>
</body>
</html>
